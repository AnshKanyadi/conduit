name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same branch/PR — no point running stale code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Go tests ───────────────────────────────────────────────────────────────
  test-go:
    name: Go test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true           # caches $GOPATH/pkg/mod and ~/.cache/go-build

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        # ubuntu-latest has a real PTY device — the Linux PTY tests run here.
        run: go test -race -count=1 -timeout=120s ./...

  # ── Frontend build ─────────────────────────────────────────────────────────
  test-web:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --prefix web

      - name: Build
        run: npm run build --prefix web

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  # ── Docker build (verify) ──────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test-go, test-web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          tags: ${{ env.IMAGE_NAME }}-web:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Publish to GHCR (main branch only) ────────────────────────────────────
  publish:
    name: Publish images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker-build]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:   ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Extract metadata (frontend)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags:   ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
