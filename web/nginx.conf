server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- Static SPA assets --------------------------------------------------
    # All non-file paths fall back to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- WebSocket proxy (→ Conduit server) ---------------------------------
    # In docker-compose, CONDUIT_UPSTREAM is injected via envsubst.
    # In production (CloudFront), /ws is handled by a separate ALB behaviour.
    location /ws {
        proxy_pass         http://${CONDUIT_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        # Long idle timeout — WebSocket sessions can be hours long.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Prometheus metrics proxy -------------------------------------------
    location /metrics {
        proxy_pass http://${CONDUIT_UPSTREAM};
    }

    # ---- Security headers ----------------------------------------------------
    add_header X-Frame-Options       "DENY"              always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Referrer-Policy       "strict-origin"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:"
        always;

    # Gzip text assets.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
